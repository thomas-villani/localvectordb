repos:
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        language_version: python3.12

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.12
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]
        # Match the project's bandit scope (pyproject targets = ["src"], CI runs
        # `bandit -r src/`): dev-only scripts legitimately use subprocess etc.
        files: ^src/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.17.1
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml, src/]
        # Install the project's type-affecting dependencies so this isolated env
        # type-checks against real types exactly as CI's full venv does. Without
        # faiss/numpy here, faiss is treated as Any and warn_unused_ignores then
        # flags the (genuinely needed) ignores for faiss stub gaps as unused.
        additional_dependencies:
          - faiss-cpu
          - numpy
          - tiktoken
          - httpx
          - fastapi
          - slowapi
          - types-requests
          - types-toml
        pass_filenames: false
        files: ^src/
