name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and check only; do not publish"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: |
          uv run black --check src/ tests/
          uv run ruff check .
          uv run mypy src/
          uv run bandit -c pyproject.toml -r src/

      - name: Run tests
        run: uv run pytest -m "not slow and not network" --cov=localvectordb --cov=localvectordb_server

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          echo "Tag version: $tag / pyproject version: $version"
          if [ "$tag" != "$version" ]; then
            echo "::error::Tag v$tag does not match pyproject version $version"
            exit 1
          fi

      - name: Build sdist and wheel
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Verify sdist excludes internal docs
        run: |
          if tar -tzf dist/*.tar.gz | grep -E 'competitive-analysis|claude-code-review|remote-layer-streaming|todo-v2'; then
            echo "::error::Internal notes leaked into sdist"; exit 1
          fi

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Only publish for real tag pushes, never for a dry-run dispatch.
    if: startsWith(github.ref, 'refs/tags/') && github.event.inputs.dry_run != 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/localvectordb
    permissions:
      id-token: write # required for PyPI trusted publishing (OIDC)
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
