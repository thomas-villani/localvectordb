name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Format check with black
        run: uv run black --check src/ tests/

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Type check with mypy
        run: uv run mypy src/

      - name: Security lint with bandit
        run: uv run bandit -c pyproject.toml -r src/

  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # The ubuntu/3.12 job additionally installs the `mcp` extra so the MCP
        # server tests run; other jobs install the dev group only (the suite
        # skips MCP tests gracefully when fastmcp is absent).
        include:
          - { os: ubuntu-latest, python: "3.12", extras: "--extra mcp" }
          - { os: ubuntu-latest, python: "3.13", extras: "" }
          - { os: ubuntu-latest, python: "3.14", extras: "" }
          - { os: windows-latest, python: "3.12", extras: "" }
          - { os: macos-latest, python: "3.12", extras: "" }

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Install dependencies
        run: uv sync --dev ${{ matrix.extras }} --python ${{ matrix.python }}

      - name: Run tests
        run: uv run --python ${{ matrix.python }} pytest -m "not slow and not network" --cov=localvectordb --cov=localvectordb_server --cov-report=term-missing

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Build sdist and wheel
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      # The base wheel must import with zero extras installed. A stray import of
      # an extras-only dependency (this bit us once with psutil) is invisible to
      # the dev-env test suite but breaks every `pip install localvectordb`.
      - name: Verify base wheel imports with no extras
        run: |
          WHEEL="$(ls dist/*.whl)"
          echo "Importing $WHEEL in an isolated environment..."
          uv run --isolated --no-project --with "$WHEEL" \
            python -c "import localvectordb; print('ok', localvectordb.__version__)"

      - name: Verify sdist excludes internal docs
        run: |
          if tar -tzf dist/*.tar.gz | grep -E 'competitive-analysis|claude-code-review|remote-layer-streaming|todo-v2'; then
            echo "::error::Internal notes leaked into sdist"; exit 1
          fi

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
