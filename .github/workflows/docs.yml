name: Docs

on:
  push:
    branches: [main]
  # Also build on PRs so the -W warning gate below actually blocks a regression
  # before it merges, rather than reporting it once it is already on main.
  pull_request:
    branches: [main]
  workflow_dispatch:

# Permissions required to deploy to GitHub Pages via the official actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress run so a
# deploy completes before the next starts.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      # -W turns warnings into errors so doc rot (duplicate targets, malformed
      # markup, broken :doc:/:ref: links) fails the build instead of silently
      # shipping. --keep-going reports every warning in one run rather than
      # stopping at the first. The tree is warning-clean as of the v0.1.0 docs
      # audit; if this starts failing, fix the warning rather than dropping -W.
      # Note: conf.py uses intersphinx, so this step needs network access to
      # docs.python.org and numpy.org to resolve type links.
      - name: Build HTML docs
        run: uv run sphinx-build -b html -W --keep-going docs/source docs/build/html

      - name: Disable Jekyll processing
        run: touch docs/build/html/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy:
    needs: build
    # PRs build (to run the -W gate) but must not publish to Pages.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
