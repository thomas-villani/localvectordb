[tool:pytest]
# Pytest configuration for LocalVectorDB test suite

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 3.8

# Test paths
testpaths = tests

# Add current directory to Python path
addopts =
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --cov=localvectordb
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=85
    --durations=10

# Markers for organizing tests
markers =
    unit: Unit tests for individual components
    integration: Integration tests that test multiple components together
    slow: Tests that may take longer to run (>5 seconds)
    network: Tests that require network access
    database: Tests that involve database operations
    embedding: Tests that involve embedding operations
    chunking: Tests that involve text chunking
    client: Tests for remote client functionality
    performance: Performance and benchmark tests
    regression: Regression tests for specific bug fixes

# Warnings configuration
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*httpx.*:DeprecationWarning
    ignore:.*asyncio.*:DeprecationWarning

# Test output options
console_output_style = progress
junit_family = xunit2

# Test timeout (in seconds)
timeout = 300
timeout_method = thread

# Parallel execution settings (when pytest-xdist is installed)
# addopts = -n auto

# Coverage configuration
[coverage:run]
source = localvectordb
omit =
    */tests/*
    */test_*
    setup.py
    */venv/*
    */env/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml